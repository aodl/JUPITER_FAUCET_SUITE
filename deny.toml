# Dependency policy for Jupiter Faucet Suite.
# Generated from `cargo deny init`, then tightened for production-readiness checks.

[graph]
all-features = false

[advisories]
# cargo-deny fails vulnerable, unmaintained, unsound, and yanked advisories by default.
# Exceptions below are narrow, documented, and should be removed when upstream
# dependencies provide a safe upgrade path.
ignore = [
    { id = "RUSTSEC-2025-0012", reason = "backoff 0.4.0 via pocket-ic 13.0.0 dev/test dependencies only: canisters/{disburser,faucet,historian,relay} dev-dependencies and xtask. Classification: dev-test-only. pocket-ic 14.0.0 still depends on backoff, so no safe upstream-removal upgrade is available now. Mitigation: keep PocketIC confined to dev/test dependencies. Scope enforcement: tools/scripts/security-scan verifies this package is not present in production value-moving or privileged operational runtime paths. Owner: protocol-maintainers." },
    { id = "RUSTSEC-2024-0384", reason = "instant 0.1.13 via backoff 0.4.0 -> pocket-ic 13.0.0 dev/test dependencies only: canisters/{disburser,faucet,historian,relay} dev-dependencies and xtask. Classification: dev-test-only. pocket-ic 14.0.0 still depends on backoff/instant, so no safe upstream-removal upgrade is available now. Mitigation: keep PocketIC confined to dev/test dependencies. Scope enforcement: tools/scripts/security-scan verifies this package is not present in production value-moving or privileged operational runtime paths. Owner: protocol-maintainers." },
    { id = "RUSTSEC-2024-0436", reason = "paste 1.0.15 via candid 0.10.29, including production Candid derive/build paths for canisters/{disburser,faucet,historian,relay,lifeline}; it appears in wasm normal/build trees as a proc-macro dependency, not runtime code. Classification: production-proc-macro-only. Latest candid 0.10.29 still depends on paste, and ic-cdk was upgraded to 0.20.1 where compatible. Mitigation: keep dependency direct and current, track candid removal. Scope enforcement: tools/scripts/security-scan verifies paste may appear only as proc-macro support, not as runtime logic or broader build-only support, in production value-moving and privileged operational trees. Owner: protocol-maintainers." },
    { id = "RUSTSEC-2021-0127", reason = "serde_cbor 0.11.2 via ic-http-certification 3.2.0/ic-asset-certification 3.2.0 frontend production path and via pocket-ic 13.0.0 dev/test tooling. Classification: frontend-informational-only, with additional dev-test-only PocketIC paths. Acceptable only while limited to frontend informational display and/or dev/test tooling, not value-moving canister runtime paths. No newer ic-http-certification/ic-asset-certification exists, and pocket-ic 14.0.0 still depends on serde_cbor. Mitigation: confine PocketIC to dev/test, keep frontend certification dependency pinned/current. Scope enforcement: tools/scripts/security-scan verifies this package is not present in production value-moving or privileged operational runtime paths. Owner: protocol-maintainers." },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    # Current graph requires these permissive/public-domain style licenses.
    "BlueOak-1.0.0",
    "CC0-1.0",
    # Used instead of LGPL for priority-queue's `LGPL-3.0 OR MPL-2.0` expression.
    "MPL-2.0",
]
confidence-threshold = 0.8

exceptions = []

[licenses.private]
# Workspace crates are private protocol canisters, mocks, support crates, and xtask.
# Each workspace package is marked `publish = false`; keep this enabled so the
# policy checks third-party dependency licensing rather than local unpublished crates.
ignore = true

