[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
allow-workspace = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# DFINITY IC git crates are pinned in Cargo.toml for NNS/governance/ledger type compatibility.
# build-info is a transitive pinned git dependency of the same DFINITY IC source graph.
allow-git = [
    "https://github.com/dfinity/ic",
    "https://github.com/dfinity-lab/build-info",
]
