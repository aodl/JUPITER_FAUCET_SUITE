id = "RUSTSEC-2025-0012"
reason = "backoff 0.4.0 via pocket-ic 13.0.0 dev/test dependencies only: canisters/{disburser,faucet,historian,relay} dev-dependencies and xtask. Not present in production wasm normal/build trees. pocket-ic 14.0.0 still depends on backoff, so no safe upstream-removal upgrade is available now. Mitigation: keep PocketIC confined to dev/test dependencies and verify wasm trees. Owner: protocol-maintainers. Review/expiry: 2026-09-03."

