reason = "serde_cbor 0.11.2 via ic-http-certification 3.2.0/ic-asset-certification 3.2.0 frontend production path and via pocket-ic 13.0.0 dev/test tooling. Classification: frontend-informational-only, with additional dev-test-only PocketIC paths. Acceptable only while limited to frontend informational display and/or dev/test tooling, not value-moving canister runtime paths. No newer ic-http-certification/ic-asset-certification exists, and pocket-ic 14.0.0 still depends on serde_cbor. Mitigation: confine PocketIC to dev/test, keep frontend certification dependency pinned/current. Scope enforcement: tools/scripts/security-scan verifies this package is not present in production value-moving or privileged operational runtime paths. Owner: protocol-maintainers."
