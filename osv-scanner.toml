id = "RUSTSEC-2024-0436"
reason = "paste 1.0.15 via candid 0.10.29, including production Candid derive/build paths for canisters/{disburser,faucet,historian,relay,lifeline}; it appears in wasm normal/build trees as a proc-macro dependency, not runtime code. Classification: production-proc-macro-only. Latest candid 0.10.29 still depends on paste, and ic-cdk was upgraded to 0.20.1 where compatible. Mitigation: keep dependency direct and current, track candid removal. Scope enforcement: tools/scripts/security-scan verifies paste may appear only as proc-macro support, not as runtime logic or broader build-only support, in production value-moving and privileged operational trees. Owner: protocol-maintainers."

[[IgnoredVulns]]
