[[IgnoredVulns]]
id = "RUSTSEC-2025-0012"
reason = "backoff 0.4.0 via pocket-ic 13.0.0 dev/test dependencies only: canisters/{disburser,faucet,historian,relay} dev-dependencies and xtask. Classification: dev-test-only. pocket-ic 14.0.0 still depends on backoff, so no safe upstream-removal upgrade is available now. Mitigation: keep PocketIC confined to dev/test dependencies. Scope enforcement: tools/scripts/security-scan verifies this package is not present in production value-moving or privileged operational runtime paths. Owner: protocol-maintainers."

