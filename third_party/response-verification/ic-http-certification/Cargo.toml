[package]
name = "ic-http-certification"
version = "3.0.3"
edition = "2021"
authors = ["DFINITY Stiftung"]
repository = "https://github.com/dfinity/response-verification"
homepage = "https://github.com/dfinity/response-verification#readme"
license = "Apache-2.0"
description = "Certification for HTTP responses for the Internet Computer"
readme = "README.md"
documentation = "https://docs.rs/ic-http-certification"
categories = ["api-bindings", "data-structures", "algorithms", "cryptography::cryptocurrencies"]
keywords = ["internet-computer", "agent", "utility", "icp", "dfinity"]
include = ["src", "Cargo.toml", "LICENSE", "README.md"]

[dependencies]
candid = "0.10"
serde = { version = "1", features = ["derive"] }
http = "1"
urlencoding = "2"
ic-representation-independent-hash = { path = "../ic-representation-independent-hash" }
ic-certification = { path = "../ic-certification", features = ["serde"] }
thiserror = "1"
base64 = "0.22"
serde_cbor = "0.11"
