canisters:
  - name: jupiter_disburser
    build:
      steps:
        - type: script
          commands:
            - ./scripts/build-canister jupiter-disburser
            - cp release-artifacts/jupiter_disburser.wasm "$ICP_WASM_OUTPUT_PATH"
    init_args:
      path: jupiter-disburser/mainnet-install-args.did
      format: candid
  - name: jupiter_lifeline
    build:
      steps:
        - type: script
          commands:
            - ./scripts/build-canister jupiter-lifeline
            - cp release-artifacts/jupiter_lifeline.wasm "$ICP_WASM_OUTPUT_PATH"
  - name: jupiter_faucet
    build:
      steps:
        - type: script
          commands:
            - ./scripts/build-canister jupiter-faucet
            - cp release-artifacts/jupiter_faucet.wasm "$ICP_WASM_OUTPUT_PATH"
    init_args:
      path: jupiter-faucet/mainnet-install-args.did
      format: candid
  - name: jupiter_sns_rewards
    build:
      steps:
        - type: script
          commands:
            - ./scripts/build-canister jupiter-sns-rewards
            - cp release-artifacts/jupiter_sns_rewards.wasm "$ICP_WASM_OUTPUT_PATH"
  - name: jupiter_faucet_frontend
    build:
      steps:
        - type: script
          commands:
            - ./scripts/build-canister jupiter-faucet-frontend
            - cp release-artifacts/jupiter_faucet_frontend.wasm "$ICP_WASM_OUTPUT_PATH"
  - name: jupiter_historian
    build:
      steps:
        - type: script
